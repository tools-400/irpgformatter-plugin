#
# Tooltips (Preferences)
Tooltip_Use_const_keyword=Umschließt den Wert von dcl-c Anweisungen mit dem Schlüsselwort const().
Tooltip_Put_delimiter_before_parameter=Setzt das Doppelpunkt-Trennzeichen vor den Parameter statt nach dem vorhergehenden Parameter.
Tooltip_Parameter_spacing_style=Bestimmt, wo Leerzeichen um Doppelpunkte in Parameterlisten platziert werden.
Tooltip_Align_Sub_Fields=Richtet Unterfelder und Parameter von Datenstruktur- und Prozedurdeklarationen aus.
Tooltip_Break_on_case_change=Bricht lange Namen am Übergang zwischen Klein- und Großbuchstaben um.
Tooltip_Break_before_keyword=Beginnt eine neue Zeile vor Schlüsselwörtern wie EXTPROC oder EXTPGM.
Tooltip_Sort_const_value_to_end=Verschiebt das const- oder value-Schlüsselwort ans Ende von Unterfeld-Deklarationen.
Tooltip_Max_name_length=Maximale Zeichenanzahl für einen Namen oder ein Literal, bevor es mit Auslassungszeichen (...) getrennt wird.
Tooltip_Min_name_length=Minimale Zeichenanzahl, die beim Trennen langer Namen oder Literale auf einer Zeile verbleiben muss.
Tooltip_Execute_IBM_formatter=Führt den IBM RDi Formatierer vor iRPGFormatter aus, um die IBM Formatierungsregeln zuerst anzuwenden.
Tooltip_Execute_iRPG_formatter=Führt den iRPG Formatierer aus, um die iRPG Formatierungsregeln anzuwenden.
Tooltip_Format_on_save=Formatiert die Quelle automatisch beim Speichern.
Tooltip_View_Edit_raw_code=Schaltet zwischen formatierter Vorschau und Bearbeitungsmodus für den Rohcode um.
Tooltip_Custom_preview_contents=Schaltet zwischen der Standard-Vorschauquelle und Ihrem eigenen Quellcode um.
Tooltip_Show_whitespaces=Macht Leerzeichen und Tabulatorzeichen in der Vorschau sichtbar.
Tooltip_Preview_line_width=Legt die maximale Zeilenlänge für die Vorschau fest. Das vertikale Lineal und die Zeilenumbrüche passen sich entsprechend an.
Tooltip_Reset_preview_line_width=Setzt die Vorschau-Zeilenbreite auf den Standardwert zurück.
