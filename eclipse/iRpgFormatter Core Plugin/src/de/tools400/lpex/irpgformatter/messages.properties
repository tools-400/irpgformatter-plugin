#
# Tooltips (Preferences)
Tooltip_Use_const_keyword=Wraps the value of dcl-c statements in a const() keyword.
Tooltip_Put_delimiter_before_parameter=Places the colon delimiter before the parameter instead of after the preceding parameter.
Tooltip_Parameter_spacing_style=Controls where spaces are placed around colons in parameter lists.
Tooltip_Align_Sub_Fields=Aligns sub-fields and parameters of data structure and procedure declarations.
Tooltip_Break_on_case_change=Breaks long names at transitions between lowercase and uppercase characters.
Tooltip_Break_before_keyword=Starts a new line before keywords such as EXTPROC or EXTPGM.
Tooltip_Sort_const_value_to_end=Moves the const or value keyword to the end of sub-field declarations.
Tooltip_Max_name_length=Maximum number of characters for a name or literal before it is split with an ellipsis (...).
Tooltip_Min_name_length=Minimum number of characters that must remain on a line when splitting long names or literals.
Tooltip_Execute_IBM_formatter=Runs the IBM RDi formatter before iRPGFormatter to apply IBM formatting rules first.
Tooltip_Execute_iRPG_formatter=Runs the iRPGFormatter to apply iRPG formatting rules.
Tooltip_Format_on_save=Automatically formats the source when saving.
Tooltip_View_Edit_raw_code=Toggles between formatted preview and raw code editing mode.
Tooltip_Custom_preview_contents=Switches between the default preview source and your custom source code.
Tooltip_Show_whitespaces=Makes spaces and tab characters visible in the preview.
Tooltip_Preview_line_width=Sets the maximum line width for the preview. The vertical ruler and line breaks adjust accordingly.
Tooltip_Reset_preview_line_width=Resets the preview line width to the default value.
