#
# Tooltips (Preferences)
Tooltip_Use_const_keyword=Racchiude il valore delle istruzioni dcl-c nella parola chiave const().
Tooltip_Put_delimiter_before_parameter=Posiziona il delimitatore due punti prima del parametro invece che dopo il parametro precedente.
Tooltip_Parameter_spacing_style=Controlla dove vengono posizionati gli spazi intorno ai due punti nelle liste di parametri.
Tooltip_Align_Sub_Fields=Allinea i sottocampi e i parametri delle dichiarazioni di strutture dati e procedure.
Tooltip_Break_on_case_change=Interrompe i nomi lunghi nelle transizioni tra lettere minuscole e maiuscole.
Tooltip_Break_before_keyword=Inizia una nuova riga prima di parole chiave come EXTPROC o EXTPGM.
Tooltip_Sort_const_value_to_end=Sposta la parola chiave const o value alla fine delle dichiarazioni dei sottocampi.
Tooltip_Max_name_length=Numero massimo di caratteri per un nome o un letterale prima di essere diviso con i puntini di sospensione (...).
Tooltip_Min_name_length=Numero minimo di caratteri che devono rimanere su una riga quando si dividono nomi o letterali lunghi.
Tooltip_Execute_IBM_formatter=Esegue il formattatore IBM RDi prima di iRPGFormatter per applicare prima le regole di formattazione IBM.
Tooltip_Execute_iRPG_formatter=Esegue il formattatore iRPG per applicare le regole di formattazione iRPG.
Tooltip_Format_on_save=Formatta automaticamente il sorgente durante il salvataggio.
Tooltip_View_Edit_raw_code=Alterna tra anteprima formattata e modalitŕ di modifica del codice raw.
Tooltip_Custom_preview_contents=Alterna tra il sorgente di anteprima predefinito e il proprio codice sorgente personalizzato.
Tooltip_Show_whitespaces=Rende visibili gli spazi e i caratteri di tabulazione nell'anteprima.
Tooltip_Preview_line_width=Imposta la larghezza massima della riga per l'anteprima. Il righello verticale e le interruzioni di riga si adattano di conseguenza.
Tooltip_Reset_preview_line_width=Ripristina la larghezza della riga di anteprima al valore predefinito.
